    { name = "matplotlib" },
    { name = "nupunkt" },
    { name = "pysbd" },
    { name = "rich" },
    { name = "sentence-splitter" },
    { name = "sentencex" },
    { name = "sentsplit" },
    { name = "setuptools" },
]
dev = [
    { name = "pre-commit" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "python-docstring-markdown" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "blingfire", marker = "extra == 'bench'" },
    { name = "ftfy", specifier = ">=6.2.0,<7.0" },
    { name = "loguru", specifier = ">=0.7.3,<1.0" },
    { name = "matplotlib", marker = "extra == 'bench'" },
    { name = "nupunkt", marker = "extra == 'bench'" },
    { name = "pre-commit", marker = "extra == 'dev'", specifier = ">=4.4.0" },
    { name = "pydantic", specifier = ">=2.11.0,<3.0" },
    { name = "pysbd", marker = "extra == 'bench'" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8.3.5" },
    { name = "pytest-cov", marker = "extra == 'dev'", specifier = ">=6.2.1" },
    { name = "python-docstring-markdown", marker = "extra == 'dev'", specifier = ">=0.2.2" },
    { name = "regex", specifier = ">=2025.7.29" },
    { name = "retrie", specifier = ">=0.3.0,<1.0" },
    { name = "rich", marker = "extra == 'bench'" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.14.14" },
    { name = "sentence-splitter", marker = "extra == 'bench'" },
    { name = "sentencex", marker = "extra == 'bench'" },
    { name = "sentsplit", marker = "extra == 'bench'" },
    { name = "setuptools", marker = "extra == 'bench'", specifier = "<81" },
]
provides-extras = ["dev", "bench"]
